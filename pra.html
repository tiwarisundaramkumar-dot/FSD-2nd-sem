<!DOCTYPE html>
<html>
<head>
<title>Student Result Calculator</title>

<style>
body{
    font-family: Arial;
    background-color:#f2f2f2;
    text-align:center;
}

.container{
    width:350px;
    background:white;
    padding:20px;
    margin:auto;
    margin-top:50px;
    border-radius:10px;
    box-shadow:0px 0px 10px gray;
}

input{
    width:90%;
    padding:8px;
    margin:5px;
}

button{
    padding:10px 20px;
    background:#333;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:black;
}

#result{
    margin-top:20px;
    font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<h2>Student Result Calculator</h2>

<input type="text" id="name" placeholder="Enter Student Name"><br>

<input type="number" id="s1" placeholder="Subject 1 Marks"><br>
<input type="number" id="s2" placeholder="Subject 2 Marks"><br>
<input type="number" id="s3" placeholder="Subject 3 Marks"><br>
<input type="number" id="s4" placeholder="Subject 4 Marks"><br>
<input type="number" id="s5" placeholder="Subject 5 Marks"><br>

<button onclick="calculate()">Calculate Result</button>

<div id="result"></div>

</div>

<script>

function calculate(){

let name = document.getElementById("name").value;

let marks = [
Number(document.getElementById("s1").value),
Number(document.getElementById("s2").value),
Number(document.getElementById("s3").value),
Number(document.getElementById("s4").value),
Number(document.getElementById("s5").value)
];

let total = 0;

// loop
for(let i=0;i<marks.length;i++){
total = total + marks[i];
}

let percentage = total/5;

let grade;

// condition
if(percentage >= 90){
grade = "A+";
}
else if(percentage >= 75){
grade = "A";
}
else if(percentage >= 60){
grade = "B";
}
else if(percentage >= 50){
grade = "C";
}
else{
grade = "Fail";
}

document.getElementById("result").innerHTML = 
"Name: "+name+"<br>"+
"Total Marks: "+total+"<br>"+
"Percentage: "+percentage+"%<br>"+
"Grade: "+grade;

}

</script>

</body>
</html>
